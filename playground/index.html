<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./output.css" />
    <title>NepaliUI Playground</title>
</head>

<body style="padding:40px; display:grid; gap:16px;">
    <button class="nui-btn nui-btn-success">Primary Button</button>
    <button class="nui-btn nui-btn-outline">Outline Button</button>

    <input class="nui-input" placeholder="Enter your name" />

    <div class="nui-card">This is a card</div>

    <div class="nui-alert">Something happened</div>

    <span class="nui-badge">New</span>
</body>

</html>
